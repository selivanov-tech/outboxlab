name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: api — unit + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: outboxlab
          POSTGRES_PASSWORD: outboxlab
          POSTGRES_DB: outboxlab
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://outboxlab:outboxlab@localhost:55432/outboxlab
      APP_ENV: ci
      # Settings requires api_domain; CI never serves traffic, so a placeholder is fine.
      API_DOMAIN: localhost
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.15"

      - name: Sync deps
        run: uv sync --frozen

      # Role + GRANTs live outside the migration so prod (Neon) can use
      # its pre-configured app role without giving the migration role
      # CREATEROLE. In CI we run the same SQL via psql here.
      - name: Bootstrap app role
        env:
          PGPASSWORD: outboxlab
        working-directory: ${{ github.workspace }}
        run: psql -h localhost -p 55432 -U outboxlab -d outboxlab -f infra/postgres/bootstrap_app_role.sql

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Seed default workspace
        run: uv run python -m app.identity.infrastructure.seed

      - name: Run tests
        run: uv run pytest -q

  typecheck:
    name: api + worker — pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.15"

      - name: Sync api deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Pyright api
        working-directory: apps/api
        run: uv run pyright

      - name: Sync worker deps
        working-directory: apps/worker-py
        run: uv sync --frozen

      - name: Pyright worker
        working-directory: apps/worker-py
        run: uv run pyright

  lint:
    name: api + worker — ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.15"

      - name: Sync api deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff api
        working-directory: apps/api
        run: |
          uv run ruff format --check app tests
          uv run ruff check app tests

      - name: Sync worker deps
        working-directory: apps/worker-py
        run: uv sync --frozen

      - name: Ruff worker
        working-directory: apps/worker-py
        run: |
          uv run ruff format --check main.py
          uv run ruff check main.py

  leak-check:
    name: tracked-files hostname leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -f infra/make/deploy.mk check-leaks

  deploy-api:
    name: deploy api to fly.io
    needs: [api-tests, typecheck, lint, leak-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: make -f infra/make/deploy.mk deploy FLY=flyctl FLY_DEPLOY_FLAGS=--remote-only
