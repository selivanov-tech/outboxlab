# fly.io config for apps/api
# Deploy: fly deploy -c infra/prod/fly/api.fly.toml --dockerfile infra/prod/api/Dockerfile

app = "outboxlab-api"
primary_region = "iad"

# Dockerfile is passed via the `--dockerfile` flag in the deploy command above,
# not via [build] (fly resolves [build].dockerfile relative to CLI cwd, not the toml).

[env]
  APP_ENV = "production"
  PORT = "8000"

# Run migrations on every release in a one-off VM. Fails the deploy if
# alembic exits non-zero, so a broken migration never reaches a serving
# machine. DATABASE_URL is read from fly secrets.
[deploy]
  release_command = "alembic upgrade head"

# During demo week (step 4 Loom) bump min_machines_running = 1 to avoid cold-start
# latency on the first request after idle.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
